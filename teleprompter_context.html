<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canonical Context & Aspirations Teleprompter</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #E95420; /* Canonical Orange */
            --text: #ffffff;
            --dim: #888;
        }
        body {
            font-family: 'Ubuntu', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: var(--card);
            border-bottom: 2px solid var(--accent);
            z-index: 10;
        }
        .slide-indicator {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls button {
            background-color: transparent;
            color: var(--text);
            border: 1px solid #444;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s;
        }
        .controls button:hover:not(:disabled) {
            background: var(--accent);
            border-color: var(--accent);
        }
        .controls button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .transcript-wrapper {
            flex-grow: 1;
            position: relative;
            padding: 5vh 6vw;
            box-sizing: border-box;
            overflow: hidden;
        }
        #transcript-content {
            display: block;
            width: 100%;
            text-align: center;
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.5;
            font-weight: 400;
            color: #f0f0f0;
        }
        .ipa {
            color: var(--dim);
            font-size: 0.7em;
            font-weight: 300;
            display: block;
            margin-bottom: 10px;
        }
        .footer-hint {
            padding: 8px;
            font-size: 11px;
            color: #444;
            text-align: center;
            background: rgba(0,0,0,0.5);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="slide-indicator" id="slide-title">Slide 1: Mission & Purpose</div>
        <div class="controls">
            <button id="prev-btn" onclick="prevSlide()">◀ PREV</button>
            <button id="next-btn" onclick="nextSlide()">NEXT ▶</button>
        </div>
    </div>

    <div class="transcript-wrapper">
        <div id="transcript-content">
            <!-- Transcript will be loaded here -->
        </div>
    </div>

    <div class="footer-hint" id="sync-status">
        Cloud Sync Active: ?sync=context_2026
    </div>

    <script>
        const transcripts = [
            {
                title: "1. Mission & Purpose",
                text: "Canonical's mission to securely deliver open-source software to the world deeply resonates with the systems reliability mindset I cultivated during my UPenn MCIT studies and my previous enterprise leadership. What is most appealing is the democratization of infrastructure—ensuring that cutting-edge capabilities like Kubernetes and Kubeflow are not walled gardens reserved for a few tech giants, but robust, reliable tools available to the broader engineering community. However, the primary risk in aggressive open-source democratization is the fragmentation of standards and the accumulation of technical debt across disparate environments. It requires immense rigor to maintain backward compatibility and enterprise-grade security, making the Field Engineer's role both critical and demanding."
            },
            {
                title: "2. Competition & Strategy",
                text: "Looking at the competitive landscape, key competitors include Red Hat with OpenShift, SUSE, and proprietary cloud-native ML services like AWS SageMaker or GCP Vertex AI. Canonical should win by leaning into its economics and ubiquity. Ubuntu is already the default developer experience for AI and ML. By ensuring that the path from a local Ubuntu workstation with MicroK8s to large-scale enterprise clusters is mathematically rigorous, economically superior, and frictionless—via Juju and Charms—Canonical can make proprietary lock-ins functionally obsolete."
            },
            {
                title: "3. Why Canonical?",
                text: "Why Canonical? At NetEase, I scaled a team to 120 people, learning that the true bottleneck of innovation isn't always ideas—it's infrastructure and reliable protocols. Canonical operates at the very bedrock of the modern software stack. I want to build the 'bricks and mortar' of the AI revolution, moving away from high-level application layers to where the tectonic plates of computing actually shift—operating systems, Kernels, and distributed systems."
            },
            {
                title: "4. Innovation & Change",
                text: "If I could change one thing, I would want to systematically bridge the gap between open-source adoption and enterprise mathematical rigor. While Canonical excels at OS-level ubiquity, the ML ecosystem specifically can feel fragmented to enterprise adopters. I would focus on creating aggressive, standardized 'golden paths'—like Diátaxis documentation for ML architectures—to reduce cognitive load for data scientists transitioning into MLOps production."
            },
            {
                title: "5. Role Excitement",
                text: "The MLOps Field Engineer role perfectly marries my UPenn engineering rigor with my frontline executive experience. It requires understanding the deep technical realities of Kubernetes, CUDA, and distributed training, while simultaneously acting as a trusted advisor and architecture architect for enterprise clients. It is the ultimate Interdisciplinary Bridge role, and that is exactly where I thrive."
            }
        ];

        let currentSlide = 0;
        let isScaling = false;

        function updateUI(fromSync = false) {
            document.getElementById('slide-title').innerText = transcripts[currentSlide].title;
            document.getElementById('transcript-content').innerHTML = transcripts[currentSlide].text;
            
            document.getElementById('prev-btn').disabled = currentSlide === 0;
            document.getElementById('next-btn').disabled = currentSlide === transcripts.length - 1;
            
            if (!fromSync) {
                localStorage.setItem('syncContextSlide', currentSlide);
            }
            
            // Double rAF ensures layout has settled before measuring
            requestAnimationFrame(() => requestAnimationFrame(autoScaleText));
        }

        function autoScaleText() {
            if (isScaling) return;
            isScaling = true;
            
            const container = document.getElementById('transcript-content');
            const parent = document.querySelector('.transcript-wrapper');
            if (!container || !parent) { isScaling = false; return; }
            
            // Use parent's actual content area (CSS padding is already handled)
            const maxWidth = parent.clientWidth;
            const maxHeight = parent.clientHeight;
            
            // Guard: if layout hasn't settled yet, retry
            if (maxHeight < 50) {
                isScaling = false;
                setTimeout(autoScaleText, 50);
                return;
            }
            
            // Binary search for the largest font that fits
            let lo = 14;
            let hi = 120;
            let bestSize = lo;
            
            while (lo <= hi) {
                let mid = Math.floor((lo + hi) / 2);
                container.style.fontSize = mid + 'px';
                
                if (container.scrollHeight <= maxHeight && container.scrollWidth <= maxWidth) {
                    bestSize = mid;
                    lo = mid + 1;
                } else {
                    hi = mid - 1;
                }
            }
            
            // Apply with a small safety margin to avoid edge-case overflow
            container.style.fontSize = Math.max(14, bestSize - 1) + 'px';
            isScaling = false;
        }

        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(autoScaleText, 100);
        });

        function nextSlide() {
            if (currentSlide < transcripts.length - 1) {
                currentSlide++;
                updateUI();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                updateUI();
            }
        }

        window.addEventListener('storage', (e) => {
            if (e.key === 'syncContextSlide') {
                const newSlide = parseInt(e.newValue);
                if (!isNaN(newSlide) && newSlide >= 0 && newSlide < transcripts.length && newSlide !== currentSlide) {
                    currentSlide = newSlide;
                    updateUI(true);
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                prevSlide();
            }
        });

        // Initial setup
        const urlParams = new URLSearchParams(window.location.search);
        const syncKey = urlParams.get('sync') || 'context_2026'; // Default key for context
        document.getElementById('sync-status').innerText = `Cloud Sync Active: ?sync=${syncKey}`;
        
        setInterval(async () => {
            try {
                const response = await fetch(`https://api.keyvalue.xyz/${syncKey}/currentSlide`);
                if (response.ok) {
                    const val = await response.text();
                    const newIndex = parseInt(val);
                    if (!isNaN(newIndex) && newIndex !== currentSlide && newIndex >= 0 && newIndex < transcripts.length) {
                        currentSlide = newIndex;
                        updateUI(true);
                    }
                }
            } catch (err) {}
        }, 1000);

        // Run once DOM is fully ready
        window.addEventListener('load', () => {
            updateUI();
        });
    </script>
</body>
</html>
